steps:
  # ── Build backend Docker image ──
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-backend:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-backend:latest"
      - ./server

  # ── Push backend image ──
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-backend"
    waitFor: ["build-backend"]

  # ── Build frontend Docker image ──
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-frontend:${SHORT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-frontend:latest"
      - --build-arg
      - "NEXT_PUBLIC_API_URL=${_BACKEND_URL}"
      - ./client

  # ── Push frontend image ──
  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-frontend"
    waitFor: ["build-frontend"]

  # ── Deploy backend to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mern-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=NODE_ENV=production
      - --set-secrets=MONGO_URI=MONGO_URI:latest,JWT_SECRET=JWT_SECRET:latest
    waitFor: ["push-backend"]

  # ── Deploy frontend to Cloud Run ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - mern-frontend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-frontend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
    waitFor: ["push-frontend"]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-backend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/mern-frontend:${SHORT_SHA}"

substitutions:
  _REGION: asia-south1
  _REPO: mern-stack
  _BACKEND_URL: https://mern-backend-XXXXXXXX-el.a.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
